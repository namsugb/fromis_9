<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; }
        html, body { width: 1080px; height: 1920px; margin: 0; overflow: hidden; }
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 96px 84px 104px;
            color: #19202b;
            background: #f4f1ea;
            font-family: Arial, Helvetica, sans-serif;
        }
        .top, .bottom { display: flex; justify-content: space-between; font-size: 22px; letter-spacing: .18em; }
        .top { border-top: 3px solid #19202b; padding-top: 22px; }
        h1 { margin: 0; font-size: 146px; line-height: .88; letter-spacing: -.075em; font-weight: 800; }
        h1 span { display: block; }
        h1 span:nth-child(2) { margin-left: 120px; font-style: italic; font-weight: 400; }
        .issue { writing-mode: vertical-rl; position: absolute; right: 44px; top: 50%; font-size: 18px; letter-spacing: .25em; }
        .bottom { align-items: flex-end; border-bottom: 3px solid #19202b; padding-bottom: 22px; }
        .bottom strong { font-size: 38px; letter-spacing: -.02em; }
    </style>
</head>
<body>
    <div class="top"><span>WEB EXPERIMENT</span><span>2026</span></div>
    <h1><span>I BUILT</span><span>A DIGITAL</span><span>EDITORIAL.</span></h1>
    <div class="issue">ISSUE NO. 09</div>
    <div class="bottom"><strong>fromis_9</strong><span>DESIGN × CODE</span></div>
</body>
</html>
