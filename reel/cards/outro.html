<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        * { box-sizing: border-box; }
        html, body { width: 1080px; height: 1920px; margin: 0; overflow: hidden; }
        body {
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 96px 84px 104px;
            color: #f4f1ea;
            background: #15171a;
            font-family: Arial, Helvetica, sans-serif;
        }
        .top { display: flex; justify-content: space-between; border-top: 2px solid #f4f1ea; padding-top: 22px; font-size: 20px; letter-spacing: .2em; }
        .center { display: flex; flex-direction: column; justify-content: center; }
        h1 { margin: 0; font-size: 108px; line-height: .92; letter-spacing: -.065em; }
        .stack { margin-top: 72px; display: flex; gap: 20px; font-size: 24px; letter-spacing: .12em; }
        .stack span { border: 1px solid #777; border-radius: 999px; padding: 14px 20px; }
        .bottom { border-bottom: 2px solid #f4f1ea; padding-bottom: 22px; display: flex; justify-content: space-between; align-items: flex-end; }
        .bottom strong { font-size: 44px; }
        .bottom span { font-size: 18px; letter-spacing: .22em; }
    </style>
</head>
<body>
    <div class="top"><span>DESIGNED &amp; DEVELOPED</span><span>FROM SCRATCH</span></div>
    <div class="center">
        <h1>MADE BY<br />A DEVELOPER<br />WHO BUILDS<br />THINGS.</h1>
        <div class="stack"><span>NEXT.JS</span><span>SUPABASE</span><span>TAILWIND</span></div>
    </div>
    <div class="bottom"><strong>VIEW THE FULL PROJECT</strong><span>LINK IN BIO →</span></div>
</body>
</html>
